name: taskforge
region: nyc
services:
  - name: web
    environment_slug: python
    github:
      branch: main
      deploy_on_push: true
      repo: zechariahsklar-ship-it/taskforge
    source_dir: /
    build_command: python manage.py collectstatic --noinput
    run_command: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: your-app-name.ondigitalocean.app
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: https://your-app-name.ondigitalocean.app
      - key: DJANGO_TIME_ZONE
        value: America/New_York
      - key: USE_SQLITE
        value: "False"
      - key: POSTGRES_SSL_REQUIRE
        value: "True"
      - key: USE_MOCK_TASK_PARSER
        value: "False"
      - key: DJANGO_SECRET_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: replace-me
      - key: DATABASE_URL
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: ${taskforge-db.DATABASE_URL}
databases:
  - name: taskforge-db
    engine: PG
    version: "16"
    production: true
