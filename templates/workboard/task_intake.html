{% extends "base.html" %}

{% block title %}Intake | TaskForge{% endblock %}

{% block content %}
<section class="card">
    <h1>Supervisor intake</h1>
    <p>Paste an email or request, optionally attach screenshots or images, and review the extracted task fields before saving.</p>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Parse and review</button>
    </form>
</section>
{% endblock %}
