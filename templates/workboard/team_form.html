{% extends "base.html" %}

{% block title %}{{ page_title }} | TaskForge{% endblock %}

{% block content %}
<section class="card narrow">
    <h1>{{ page_title }}</h1>
    <p>Create a team so work, people, and recurring tasks can stay separated for each group using TaskForge.</p>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">{{ submit_label }}</button>
    </form>
    <div class="inline-form">
        <a class="button-link button-link-secondary" href="{% url 'worker-list' %}">Back to workers</a>
    </div>
</section>
{% endblock %}
