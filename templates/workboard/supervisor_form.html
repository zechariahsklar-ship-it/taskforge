{% extends "base.html" %}

{% block title %}{{ page_title }} | TaskForge{% endblock %}

{% block content %}
<section class="card narrow">
    <h1>{{ page_title }}</h1>
    <p>Update supervisor details, password-reset access, and whether this supervisor is included in task assignment rotation.</p>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">{{ submit_label|default:"Save supervisor" }}</button>
    </form>
</section>
{% endblock %}
